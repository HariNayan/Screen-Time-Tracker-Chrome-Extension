<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Screen Time Tracker</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <section class="hero">
      <button id="theme-toggle" class="theme-toggle" title="Toggle dark mode">🌙</button>
      <h1 id="hero-title">Today's Activity</h1>
      <div id="total-time" class="hero-pill">0s</div>
      <p class="hero-caption">Active Time</p>
    </section>

    <section id="top-card" class="card" hidden>
      <h2 id="top-title" class="card-title centered">Top 5 Sites</h2>
      <div id="top-sites" class="top-sites"></div>
    </section>

    <section class="card">
      <div class="card-head">
        <h2 id="list-title" class="card-title">Today's Activity</h2>
        <span id="date-range" class="date-range"></span>
      </div>
      <div id="domain-list" class="domain-list">
        <p class="empty-state"><span class="empty-icon">⏳</span>No data yet. Start browsing!</p>
      </div>
    </section>

    <div id="export-menu" class="export-menu" hidden>
      <span class="export-menu-label">Export as</span>
      <button id="btn-export-json" class="pill-btn small">JSON</button>
      <button id="btn-export-csv" class="pill-btn small">CSV</button>
    </div>

    <footer>
      <button id="btn-view" class="pill-btn">
        <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18M8 3v4M16 3v4"/></svg>
        <span id="btn-view-label">This Week</span>
      </button>
      <button id="btn-export" class="pill-btn">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 4v11M7 10l5 5 5-5M4 20h16"/></svg>
        <span>Export Data</span>
      </button>
      <button id="btn-clear" class="pill-btn">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h16M9 7V4h6v3M6 7l1 13h10l1-13M10 11v6M14 11v6"/></svg>
        <span>Clear History</span>
      </button>
    </footer>

    <p class="built-by">Build by Harinayan 🤖</p>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
